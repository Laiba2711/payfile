# Render Blueprint — PayFile FREE TIER (app only, no crypto payments)
#
# Deploys:
#   - payfile-frontend  (Static Site, free forever, no sleep)
#   - payfile-backend   (Web Service on `free` plan — sleeps after 15 min
#                        inactivity, wakes on first request with ~30s delay)
#   - Neon Postgres     (external, already provisioned — free tier)
#
# NOT DEPLOYED on free tier (Bitcart stack requires paid plans for persistent
# disks + private services + background workers):
#   - bitcart-api / bitcart-worker / bitcart-admin / bitcart-btc / bitcart-trx / bitcart-redis
#
# Consequence: purchase/checkout endpoints return "Payment system not configured".
# Everything else works (auth, uploads, file sharing, admin dashboard without
# payout stats). Add the Bitcart services back later by merging the paid
# blueprint when you're ready to pay.

services:

  # ─── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: payfile-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Baked into the Vite bundle at build time — Render resolves fromService
      # refs before running buildCommand.
      - key: VITE_API_URL
        fromService:
          type: web
          name: payfile-backend
          property: host
    routes:
      # SPA fallback: unknown paths go to index.html so React Router works.
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── Backend (Web Service, free plan) ───────────────────────────────────────
  - type: web
    name: payfile-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Neon Postgres — paste in Render UI on first deploy.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OWNER_EMAIL
        sync: false
      # CORS allow-list — auto-wired to the frontend's public URL.
      - key: FRONTEND_URL
        fromService:
          type: web
          name: payfile-frontend
          property: host
      - key: BACKEND_URL
        fromService:
          type: web
          name: payfile-backend
          property: host
      # Email (Brevo)
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: SatoshiBin
