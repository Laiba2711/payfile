# Render Blueprint — PayFile FREE TIER (app only, no crypto payments)
#
# Deploys:
#   - payfile-frontend  (Static Site, free forever, no sleep)
#   - payfile-backend   (Web Service on `free` plan — sleeps after 15 min
#                        inactivity, wakes on first request with ~30s delay)
#   - Neon Postgres     (external, already provisioned — free tier)
#
# NOT DEPLOYED on free tier (Bitcart stack requires paid plans for persistent
# disks + private services + background workers):
#   - bitcart-api / bitcart-worker / bitcart-admin / bitcart-btc / bitcart-trx / bitcart-redis
#
# Consequence: purchase/checkout endpoints return "Payment system not configured".
# Everything else works (auth, uploads, file sharing, admin dashboard without
# payout stats). Add the Bitcart services back later by merging the paid
# blueprint when you're ready to pay.

services:

  # ─── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: payfile-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Full backend URL including https://. `property: host` returns only the
      # hostname (no protocol), which makes fetch treat it as a relative URL and
      # the request falls through to the SPA rewrite on the frontend origin.
      # Render service URLs follow <name>.onrender.com so this is safe to
      # hardcode.
      - key: VITE_API_URL
        value: https://payfile-backend.onrender.com
    routes:
      # SPA fallback: unknown paths go to index.html so React Router works.
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── Backend (Web Service, free plan) ───────────────────────────────────────
  - type: web
    name: payfile-backend
    runtime: docker
    # dockerfilePath and dockerContext are resolved from the REPO ROOT, not
    # from rootDir. With rootDir: backend + dockerfilePath: ./Dockerfile,
    # Render looks for /Dockerfile (repo root) and fails. So we omit rootDir
    # and point dockerfilePath at the real location.
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Neon Postgres — paste in Render UI on first deploy.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OWNER_EMAIL
        sync: false
      # CORS allow-list — must include the https:// protocol so it matches the
      # Origin header the browser sends. `property: host` returns hostname only.
      - key: FRONTEND_URL
        value: https://payfile-frontend.onrender.com
      - key: BACKEND_URL
        value: https://payfile-backend.onrender.com
      # Email (Brevo)
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: SatoshiBin
