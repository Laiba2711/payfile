# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m      rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
limit_req_zone $binary_remote_addr zone=upload:10m   rate=6r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m  rate=120r/m;

# ── HTTP → HTTPS redirect + Let's Encrypt ACME challenge ─────────────────────
server {
    listen 80;
    server_name PAYFILE_DOMAIN www.PAYFILE_DOMAIN;

    # Certbot challenge files served from this directory
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name PAYFILE_DOMAIN www.PAYFILE_DOMAIN;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/PAYFILE_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/PAYFILE_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/PAYFILE_DOMAIN/chain.pem;

    # Modern SSL
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                            always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header X-XSS-Protection           "1; mode=block"                   always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff font/woff2;

    # Global upload limit (100MB + 5MB headroom)
    client_max_body_size 105m;
    proxy_connect_timeout  60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── Auth — strict rate limiting ───────────────────────────────────────────
    location /api/auth {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Bitcart webhook — allow retries ──────────────────────────────────────
    location /api/purchases/bitcart-webhook {
        limit_req zone=webhook burst=30 nodelay;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── File upload — large body + slow rate ─────────────────────────────────
    location /api/files/upload {
        limit_req zone=upload burst=3 nodelay;
        limit_req_status 429;
        client_max_body_size 105m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_pass           http://backend:5000;
        proxy_http_version   1.1;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_set_header     Connection        "";
    }

    # ── All other API routes ──────────────────────────────────────────────────
    location /api {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Frontend (React SPA via inner nginx) ──────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
