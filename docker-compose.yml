services:

  # ─── React Frontend (Vite Dev Server — NO NGINX) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: payfile_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    # No bind mount: the image bakes in the source + node_modules (including vite).
    # Bind-mounting ./frontend here would overlay /app with the host dir and mask
    # node_modules, causing "sh: vite: not found". For live-reload dev, run
    # `cd frontend && npm run dev` outside Docker.
    networks:
      - payfile_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Node.js Backend API ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payfile_backend
    # Apply any pending Prisma migrations against Neon, then start the server.
    # Matches the CMD baked into the Dockerfile — keep in sync if either changes.
    command: sh -c "npx prisma migrate deploy && node server.js"
    restart: unless-stopped
    env_file: .env
    ports:
      # Host port 5001 to avoid conflict with macOS AirPlay Receiver on 5000.
      # Internal container port stays 5000 (what the app listens on).
      - "5001:5000"
    volumes:
      # Only persist uploads. We intentionally do NOT bind-mount ./backend here —
      # the Dockerfile bakes in the code and `npm ci` node_modules, and a bind
      # mount would overlay both with whatever is on the host (commonly an empty
      # node_modules, which crashes the container with "Cannot find module 'express'").
      - uploads_data:/app/uploads
    networks:
      - payfile_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      # Neon is remote: first boot runs `prisma migrate deploy` before the server
      # binds. 60s is plenty on a schema that already has the init migration applied.
      start_period: 60s
      retries: 3

  # ─── Bitcart Redis ──────────────────────────────────────────────────────────
  bitcart_redis:
    image: redis:7-alpine
    container_name: bitcart_redis
    restart: unless-stopped
    networks:
      payfile_net:
        aliases:
          - redis

  # ─── Bitcart BTC Daemon ─────────────────────────────────────────────────────
  bitcart_btc:
    image: bitcart/bitcart-btc:stable
    container_name: bitcart_btc
    restart: unless-stopped
    environment:
      BTC_NETWORK: ${BTC_NETWORK:-mainnet}
      BTC_SERVER:  ${BTC_ELECTRUM_SERVER}
    volumes:
      - bitcart_btc_data:/data
    networks:
      payfile_net:
        aliases:
          - btc


  # ─── Bitcart TRX Daemon ─────────────────────────────────────────────────────
  bitcart_trx:
    image: bitcart/bitcart-trx:stable
    container_name: bitcart_trx
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file: .env
    environment:
      TRX_NETWORK: mainnet
      TRX_SERVER:  https://api.trongrid.io
      TRX_API_KEY: b1989b66-9744-4be5-97e3-f03cdd27dc75
    volumes:
      - bitcart_trx_data:/data
    networks:
      payfile_net:
        aliases:
          - trx

  # ─── Bitcart Permission Init ─────────────────────────────────────────────────
  bitcart_api_init:
    image: alpine:latest
    container_name: bitcart_api_init
    user: root
    volumes:
      - bitcart_app_data:/app/data
    command: chown -R 1000:1000 /app/data
    networks:
      - payfile_net

  # ─── Bitcart Backend API ────────────────────────────────────────────────────
  bitcart_api:
    image: bitcart/bitcart:stable
    container_name: bitcart_api
    restart: unless-stopped
    depends_on:
      bitcart_redis:
        condition: service_started
      bitcart_btc:
        condition: service_started
      bitcart_trx:
        condition: service_started
      bitcart_api_init:
        condition: service_completed_successfully
    user: root
    # `alembic upgrade head` auto-applies any pending migrations on every boot —
    # safe because it's idempotent. Runs against Neon before gunicorn starts.
    command: sh -c "/app/.venv/bin/alembic upgrade head && gunicorn -c gunicorn.conf.py main:app"
    environment:
      BITCART_DEBUG:   "false"
      # Neon (managed Postgres). DB_* vars are split out of BITCART_DATABASE_URL
      # in .env. PGSSLMODE is read by asyncpg — required because Neon enforces TLS.
      DB_HOST:         ${BITCART_DB_HOST}
      DB_PORT:         ${BITCART_DB_PORT:-5432}
      DB_DATABASE:     ${BITCART_DB_NAME}
      DB_USER:         ${BITCART_DB_USER}
      DB_PASSWORD:     ${BITCART_DB_PASSWORD}
      PGSSLMODE:       require
      REDIS_HOST:      redis://redis
      BITCART_CRYPTOS: btc,trx
      BTC_HOST:        btc
      BTC_PORT:        "5000"
      BTC_NETWORK:     mainnet
      ETH_HOST:        eth
      ETH_PORT:        "5002"
      TRX_HOST:        trx
      TRX_PORT:        "5009"
      BITCART_ADMIN_URL: http://localhost:4000
      BITCART_CORS_DOMAINS: "http://localhost:4000,http://127.0.0.1:4000,http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - bitcart_app_data:/app/data
    networks:
      - payfile_net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.connect((\"localhost\",8000))'"]
      interval: 10s
      timeout: 5s
      retries: 10
      # Neon is remote (internet round-trips per migration) so first-boot alembic
      # can take ~2min through all 25+ migrations. During start_period, failures
      # do NOT count against retries — gives migrations room without going red.
      start_period: 800s

  # ─── Bitcart Worker ─────────────────────────────────────────────────────────
  bitcart_worker:
    image: bitcart/bitcart:stable
    container_name: bitcart_worker
    restart: unless-stopped
    depends_on:
      bitcart_api:
        condition: service_healthy
    command: python worker.py
    environment:
      DB_HOST:         ${BITCART_DB_HOST}
      DB_PORT:         ${BITCART_DB_PORT:-5432}
      DB_DATABASE:     ${BITCART_DB_NAME}
      DB_USER:         ${BITCART_DB_USER}
      DB_PASSWORD:     ${BITCART_DB_PASSWORD}
      PGSSLMODE:       require
      REDIS_HOST:      redis://redis
      BITCART_CRYPTOS: btc,trx
      TRX_HOST:        trx
      TRX_PORT:        "5009"
    volumes:
      - bitcart_app_data:/app/data
    networks:
      - payfile_net

  # ─── Bitcart Admin Dashboard (internal tool) ────────────────────────────────
  bitcart_admin:
    image: bitcart/bitcart-admin:stable
    container_name: bitcart_admin
    restart: unless-stopped
    depends_on:
      bitcart_api:
        condition: service_healthy
    command: yarn start
    environment:
      BITCART_ADMIN_API_URL:        http://localhost:8000
      BITCART_ADMIN_SERVER_API_URL: http://bitcart_api:8000
      BITCART_ADMIN_URL:            http://localhost:4000
      API_URL:                      http://bitcart_api:8000
      API_URL_BROWSER:              http://localhost:8000
      NUXT_HOST:                    0.0.0.0
      NUXT_PORT:                    "4000"
    # Port 4000 exposed only on localhost — not public-facing
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - payfile_net

volumes:
  uploads_data:
  bitcart_btc_data:
  bitcart_trx_data:
  bitcart_app_data:

networks:
  payfile_net:
    driver: bridge
