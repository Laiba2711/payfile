services:

  # ─── React Frontend (Vite Dev Server — NO NGINX) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: payfile_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - payfile_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Node.js Backend API ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payfile_backend
    command: node server.js
    restart: unless-stopped
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - payfile_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ─── MongoDB Database ───────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: payfile_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: payfile
    volumes:
      - payfile_db_data:/data/db
    # No external ports — security hardening
    networks:
      - payfile_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Bitcart PostgreSQL ─────────────────────────────────────────────────────
  bitcart_postgres:
    image: postgres:15-alpine
    container_name: bitcart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bitcart
      POSTGRES_USER:     bitcart
      POSTGRES_PASSWORD: ${BITCART_DB_PASSWORD:-bitcart_secure_pass}
    volumes:
      - bitcart_postgres_data:/var/lib/postgresql/data
    networks:
      payfile_net:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitcart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Bitcart Redis ──────────────────────────────────────────────────────────
  bitcart_redis:
    image: redis:7-alpine
    container_name: bitcart_redis
    restart: unless-stopped
    networks:
      payfile_net:
        aliases:
          - redis

  # ─── Bitcart BTC Daemon ─────────────────────────────────────────────────────
  bitcart_btc:
    image: bitcart/bitcart-btc:stable
    container_name: bitcart_btc
    restart: unless-stopped
    environment:
      BTC_NETWORK: ${BTC_NETWORK:-mainnet}
      BTC_SERVER:  ${BTC_ELECTRUM_SERVER}
    volumes:
      - bitcart_btc_data:/data
    networks:
      payfile_net:
        aliases:
          - btc


  # ─── Bitcart TRX Daemon ─────────────────────────────────────────────────────
  bitcart_trx:
    image: bitcart/bitcart-trx:stable
    container_name: bitcart_trx
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file: .env
    environment:
      TRX_NETWORK: mainnet
      TRX_SERVER:  https://api.trongrid.io
      TRX_API_KEY: b1989b66-9744-4be5-97e3-f03cdd27dc75
    volumes:
      - bitcart_trx_data:/data
    networks:
      payfile_net:
        aliases:
          - trx

  # ─── Bitcart Permission Init ─────────────────────────────────────────────────
  bitcart_api_init:
    image: alpine:latest
    container_name: bitcart_api_init
    user: root
    volumes:
      - bitcart_app_data:/app/data
    command: chown -R 1000:1000 /app/data
    networks:
      - payfile_net

  # ─── Bitcart Backend API ────────────────────────────────────────────────────
  bitcart_api:
    image: bitcart/bitcart:stable
    container_name: bitcart_api
    restart: unless-stopped
    depends_on:
      bitcart_postgres:
        condition: service_healthy
      bitcart_redis:
        condition: service_started
      bitcart_btc:
        condition: service_started
      bitcart_trx:
        condition: service_started
      bitcart_api_init:
        condition: service_completed_successfully
    user: root
    command: sh -c "/app/.venv/bin/alembic upgrade head && gunicorn -c gunicorn.conf.py main:app"
    environment:
      BITCART_DEBUG:   "false"
      DB_HOST:         postgres
      DB_PORT:         "5432"
      DB_DATABASE:     bitcart
      DB_USER:         bitcart
      DB_PASSWORD:     ${BITCART_DB_PASSWORD:-bitcart_secure_pass}
      REDIS_HOST:      redis://redis
      BITCART_CRYPTOS: btc,trx
      BTC_HOST:        btc
      BTC_PORT:        "5000"
      BTC_NETWORK:     mainnet
      ETH_HOST:        eth
      ETH_PORT:        "5002"
      TRX_HOST:        trx
      TRX_PORT:        "5009"
      BITCART_ADMIN_URL: http://localhost:4000
      BITCART_CORS_DOMAINS: "http://localhost:4000,http://127.0.0.1:4000,http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - bitcart_app_data:/app/data
    networks:
      - payfile_net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.connect((\"localhost\",8000))'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── Bitcart Worker ─────────────────────────────────────────────────────────
  bitcart_worker:
    image: bitcart/bitcart:stable
    container_name: bitcart_worker
    restart: unless-stopped
    depends_on:
      bitcart_api:
        condition: service_healthy
    command: python worker.py
    environment:
      DB_HOST:         postgres
      DB_PORT:         "5432"
      DB_DATABASE:     bitcart
      DB_USER:         bitcart
      DB_PASSWORD:     ${BITCART_DB_PASSWORD:-bitcart_secure_pass}
      REDIS_HOST:      redis://redis
      BITCART_CRYPTOS: btc,trx
      TRX_HOST:        trx
      TRX_PORT:        "5009"
    volumes:
      - bitcart_app_data:/app/data
    networks:
      - payfile_net

  # ─── Bitcart Admin Dashboard (internal tool) ────────────────────────────────
  bitcart_admin:
    image: bitcart/bitcart-admin:stable
    container_name: bitcart_admin
    restart: unless-stopped
    depends_on:
      bitcart_api:
        condition: service_healthy
    command: yarn start
    environment:
      BITCART_ADMIN_API_URL:        http://localhost:8000
      BITCART_ADMIN_SERVER_API_URL: http://bitcart_api:8000
      BITCART_ADMIN_URL:            http://localhost:4000
      API_URL:                      http://bitcart_api:8000
      API_URL_BROWSER:              http://localhost:8000
      NUXT_HOST:                    0.0.0.0
      NUXT_PORT:                    "4000"
    # Port 4000 exposed only on localhost — not public-facing
    ports:
      - "127.0.0.1:4000:4000"
    networks:
      - payfile_net

volumes:
  payfile_db_data:
  uploads_data:
  bitcart_postgres_data:
  bitcart_btc_data:
  bitcart_trx_data:
  bitcart_app_data:

networks:
  payfile_net:
    driver: bridge
