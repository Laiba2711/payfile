services:
  # ─── MongoDB Database (Payfile) ───────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: payfile_mongodb
    ports:
      - "27017:27017"
    volumes:
      - payfile_db_data:/data/db
    networks:
      - payfile_net

  # ─── Bitcart PostgreSQL ───────────────────────────────────────────────────
  bitcart_postgres:
    image: postgres:13-alpine
    container_name: bitcart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bitcart
      POSTGRES_USER: bitcart
      POSTGRES_PASSWORD: bitcart_pass
    volumes:
      - bitcart_postgres_data:/var/lib/postgresql/data
    networks:
      payfile_net:
        aliases:
          - postgres

  # ─── Bitcart Redis ────────────────────────────────────────────────────────
  bitcart_redis:
    image: redis:7-alpine
    container_name: bitcart_redis
    restart: unless-stopped
    networks:
      payfile_net:
        aliases:
          - redis

  # ─── Bitcart BTC Daemon ───────────────────────────────────────────────────
  bitcart_btc:
    image: bitcart/bitcart-btc:stable
    container_name: bitcart_btc
    restart: unless-stopped
    environment:
      BTC_NETWORK: testnet
      BTC_LIGHTNING: "false"
    volumes:
      - bitcart_btc_data:/data
    networks:
      payfile_net:
        aliases:
          - btc

  # ─── Bitcart ETH Daemon ───────────────────────────────────────────────────
  bitcart_eth:
    image: bitcart/bitcart-eth:stable
    container_name: bitcart_eth
    restart: unless-stopped
    environment:
      ETH_NETWORK: rinkeby
    volumes:
      - bitcart_eth_data:/data
    networks:
      payfile_net:
        aliases:
          - eth

  # ─── Bitcart TRX Daemon ───────────────────────────────────────────────────
  bitcart_trx:
    image: bitcart/bitcart-trx:stable
    container_name: bitcart_trx
    restart: unless-stopped
    environment:
      TRX_NETWORK: testnet
    volumes:
      - bitcart_trx_data:/data
    networks:
      payfile_net:
        aliases:
          - trx

  # ─── Bitcart Permission fixer ─────────────────────────────────────────────
  bitcart_api_init:
    image: alpine:latest
    container_name: bitcart_api_init
    user: root
    volumes:
      - bitcart_app_data:/app/data
    networks:
      - payfile_net
    command: chown -R 1000:1000 /app/data

  # ─── Bitcart Backend API ──────────────────────────────────────────────────
  bitcart_api:
    image: bitcart/bitcart:stable
    container_name: bitcart_api
    restart: unless-stopped
    depends_on:
      - bitcart_postgres
      - bitcart_redis
      - bitcart_btc
      - bitcart_eth
      - bitcart_trx
      - bitcart_api_init
    user: root
    command: sh -c "/app/.venv/bin/alembic upgrade head && gunicorn -c gunicorn.conf.py main:app"
    environment:
      BITCART_DEBUG: "true"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: bitcart
      DB_USER: bitcart
      DB_PASSWORD: bitcart_pass
      REDIS_HOST: redis://redis
      BITCART_CRYPTOS: btc,eth,trx
      BTC_HOST: btc
      BTC_PORT: "5000"
      BTC_NETWORK: testnet
    ports:
      - "8000:8000"
    volumes:
      - bitcart_app_data:/app/data
    networks:
      - payfile_net
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import socket; s = socket.socket(); s.connect((\"localhost\", 8000))'" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Bitcart Worker ───────────────────────────────────────────────────────
  bitcart_worker:
    image: bitcart/bitcart:stable
    container_name: bitcart_worker
    restart: unless-stopped
    depends_on:
      - bitcart_postgres
      - bitcart_redis
      - bitcart_btc
      - bitcart_eth
      - bitcart_trx
      - bitcart_api_init
    command: python worker.py
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: bitcart
      DB_USER: bitcart
      DB_PASSWORD: bitcart_pass
      REDIS_HOST: redis://redis
      BITCART_CRYPTOS: btc,eth,trx
      BTC_HOST: btc
      BTC_PORT: "5000"
      BTC_NETWORK: testnet
    volumes:
      - bitcart_app_data:/app/data
    networks:
      - payfile_net

  # ─── Bitcart Admin Dashboard ──────────────────────────────────────────────
  bitcart_admin:
    image: bitcart/bitcart-admin:stable
    container_name: bitcart_admin
    restart: unless-stopped
    depends_on:
      bitcart_api:
        condition: service_healthy
    command: yarn start
    environment:
      BITCART_ADMIN_API_URL: http://localhost:8000
      BITCART_ADMIN_SERVER_API_URL: http://bitcart_api:8000
      BITCART_ADMIN_URL: http://localhost:4000
      API_URL: http://bitcart_api:8000
      API_URL_BROWSER: http://localhost:8000
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: "4000"
    ports:
      - "4000:4000"
    networks:
      - payfile_net

  # ─── Payfile Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: payfile_backend
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongodb
      - bitcart_api
    networks:
      - payfile_net

  # ─── Payfile Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: payfile_frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - payfile_net

volumes:
  payfile_db_data:
  bitcart_postgres_data:
  bitcart_btc_data:
  bitcart_eth_data:
  bitcart_trx_data:
  bitcart_app_data:


networks:
  payfile_net:
    driver: bridge
