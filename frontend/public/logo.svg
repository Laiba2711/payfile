<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassLayer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- 1. Official Theme Maroon Coin Body -->
  <circle cx="50" cy="50" r="48" fill="#800000" stroke="#4A0E1B" stroke-width="1" />
  
  <!-- 2. Subtle Official Theme Gold Detailing -->
  <g opacity="0.2" stroke="#D4AF37" stroke-width="0.5">
    <circle cx="50" cy="50" r="42" fill="none" />
    <path d="M50 5 V15 M50 85 V95 M5 50 H15 M85 50 H95" />
  </g>

  <!-- 3. Official Theme Gold SB Monogram (Bitcoin Style) -->
  <g transform="translate(50, 50) scale(1.05) translate(-50, -50)">
    <path 
      d="M48 10 V90 M40 15 C75 15, 75 40, 50 45 C25 50, 25 80, 60 85 M50 45 C75 45, 75 75, 50 85" 
      stroke="#D4AF37" 
      stroke-width="9" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- 4. Crystal Glass Layer -->
  <circle cx="50" cy="50" r="48" fill="url(#glassLayer)" />
  
  <!-- 5. Shimmer Glint -->
  <path d="M15 50 A35 35 0 0 1 50 15" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
</svg>
